version: '3.8'

services:
  postgres-db:
    image: postgres:15-alpine
    container_name: postgres-db
    environment:
      POSTGRES_DB: testdb
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network

  spring-app:
    build: .
    container_name: spring-app
    ports:
      - "8080:8080"
    depends_on:
      - postgres-db
    environment:
      DB_HOST: postgres-db  # <-- USUNĄŁEM STĄD ":5432"
      DB_NAME: testdb
      DB_USER: test
      DB_PASS: test
    networks:
      - app-network

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge